name: Build .NET 10 class library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:

    - name: Git checkout
      uses: actions/checkout@v2

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore MultiplayerHost_host-only.sln

    - name: Build
      run: dotnet build MultiplayerHost_host-only.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test tests/MultiplayerHost.Tests/MultiplayerHost.Tests.csproj --configuration Release --no-build --verbosity normal
