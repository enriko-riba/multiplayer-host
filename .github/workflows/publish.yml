name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:  
  publish-nuget:
    runs-on: ubuntu-latest
    name: NuGet Publish
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Manual runs must target a version tag like v1.5.0."
            exit 1
          fi

          echo "package_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Output version info
        run: |
          echo "Package Version: ${{ steps.version.outputs.package_version }}"

      - name: Restore host project
        run: dotnet restore host/Host.csproj

      - name: Build host project
        run: dotnet build host/Host.csproj --configuration Release --no-restore

      - name: Test host project
        run: dotnet test tests/MultiplayerHost.Tests/MultiplayerHost.Tests.csproj --configuration Release --verbosity normal

      - name: Pack host project
        run: dotnet pack host/Host.csproj --output nuget-packages --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Push to NuGet
        run: |
          dotnet nuget push "nuget-packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_KEY }} \
            --skip-duplicate

      - name: Archive NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nuget-packages/*.nupkg
          retention-days: 30
